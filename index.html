<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClosetLife</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>

    <!-- 1. TELA DE LOGIN -->
    <div id="tela-login" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #f7f2eb, #dbe8f1 ); display: none; justify-content: center; align-items: center; z-index: 10000;">
        <div style="background: rgba(255, 255, 255, 0.45); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.6); backdrop-filter: blur(18px); text-align: center; width: 350px; box-shadow: 0 8px 25px rgba(0,0,0,0.06);">
            <h1 style="color: #c8a27c; font-family: 'Cormorant Garamond', serif; font-size: 42px; margin-bottom: 15px;">ClosetLife</h1>
            <p style="color: #4b4037; font-family: 'Montserrat', sans-serif; font-weight: 400; margin-bottom: 30px; font-size: 14px; letter-spacing: 2px;">ACESSE SEU CLOSET DIGITAL</p>
            
            <input type="password" id="senhaInput" placeholder="Senha (1234)" style="width: 100%; padding: 15px; margin-bottom: 25px; border-radius: 12px; border: 1px solid #e8d5b5; background: #fff; color: #4b4037; text-align: center; outline: none; font-family: 'Montserrat', sans-serif; font-size: 16px;">
            
            <button onclick="verificarLogin()" style="width: 100%; padding: 15px; background: #c8a27c; color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-family: 'Montserrat', sans-serif; font-size: 16px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(200, 162, 124, 0.3);">
                ENTRAR
            </button>
            
            <p id="erroLogin" style="color: #d9534f; display: none; margin-top: 20px; font-size: 14px; font-family: 'Montserrat', sans-serif;">Senha incorreta!</p>
        </div>
    </div>

    <!-- 2. SPLASH SCREEN (Abertura) -->
    <div id="splash" style="display: none;">
        <div class="splash-content">
            <h1 style="font-size: 90px; color: #c8a27c;">ClosetLife</h1>
            <p style="font-size: 18px; letter-spacing: 5px;">Seu closet digital</p>
        </div>
    </div>

    <!-- 3. MENU PRINCIPAL (Home) -->
    <div class="home-menu" id="menu-principal" style="display: none;">
        <h1 class="home-logo" style="font-size: 100px; color: #c8a27c; font-family: 'Cormorant Garamond', serif;">ClosetLife</h1>
        <p class="home-subtitle" style="font-size: 18px; letter-spacing: 5px; color: #8f8175; margin-bottom: 60px;">Seu closet digital</p>

        <div class="home-buttons">
            <a href="inventario.html" class="lux-btn" style="font-size: 22px; width: 250px; padding: 25px;">Inventário</a>
            <a href="agenda.html" class="lux-btn" style="font-size: 22px; width: 250px; padding: 25px;">Agenda</a>
            <a href="favoritos.html" class="lux-btn" style="font-size: 22px; width: 250px; padding: 25px;">Favoritos</a>
            <a href="financeiro.html" class="lux-btn" style="font-size: 22px; width: 250px; padding: 25px;">Financeiro</a>
        </div>

        <div class="home-buttons" style="margin-top:30px;">
            <a href="documentacao.html" class="lux-btn" style="font-size: 22px; width: 250px; padding: 25px;">Documentação</a>
            <a href="uml.html" class="lux-btn" style="font-size: 22px; width: 250px; padding: 25px;">UML</a>
        </div>
    </div>

    <script>
        // Lógica de Login e Transição
        function verificarLogin() {
            const senha = document.getElementById('senhaInput').value;
            if (senha === "1234") {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('menu-principal').style.display = 'block';
                feather.replace();
                sessionStorage.setItem('logado', 'sim');
            } else {
                document.getElementById('erroLogin').style.display = 'block';
            }
        }

        window.addEventListener('load', () => {
            if (sessionStorage.getItem('logado') === 'sim') {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('splash').style.display = 'none';
                document.getElementById('menu-principal').style.display = 'block';
                feather.replace();
            } else {
                document.getElementById('splash').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('tela-login').style.display = 'flex';
                }, 3000);
            }
        });
    </script>
</body>
</html>
