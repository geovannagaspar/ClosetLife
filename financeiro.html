<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro | ClosetLife</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">ClosetLife</div>
            <nav class="menu">
                <a href="index.html"><i data-feather="grid"></i>Dashboard</a>
                <a href="inventario.html"><i data-feather="shopping-bag"></i>Inventário</a>
                <a href="agenda.html"><i data-feather="calendar"></i>Agenda</a>
                <a href="favoritos.html"><i data-feather="heart"></i>Favoritos</a>
                <a href="financeiro.html" class="active"><i data-feather="dollar-sign"></i>Financeiro</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h1>Financeiro</h1>
                <p>Controle de gastos com seu closet</p>
            </header>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px;">
                <div class="card" style="padding: 25px;">
                    <h3 style="color: var(--gold); font-size: 32px; font-family: 'Cormorant Garamond', serif;">R$ 2.450,00</h3>
                    <p style="color: var(--soft); font-family: 'Montserrat', sans-serif;">Entradas do Mês</p>
                </div>
                <div class="card" style="padding: 25px;">
                    <h3 style="color: var(--gold); font-size: 32px; font-family: 'Cormorant Garamond', serif;">R$ 980,00</h3>
                    <p style="color: var(--soft); font-family: 'Montserrat', sans-serif;">Gastos do Mês</p>
                </div>
                <div class="card" style="padding: 25px;">
                    <h3 style="color: var(--gold); font-size: 32px; font-family: 'Cormorant Garamond', serif;">R$ 1.470,00</h3>
                    <p style="color: var(--soft); font-family: 'Montserrat', sans-serif;">Saldo Total</p>
                </div>
            </div>

            <div class="card" style="padding: 30px;">
                <h2 style="font-family: 'Cormorant Garamond', serif; color: var(--gold); margin-bottom: 25px; font-size: 28px;">Estatísticas Financeiras</h2>
                <canvas id="financeChart" style="max-height: 350px;"></canvas>
            </div>
        </main>
    </div>

    <script>
        feather.replace();

        const ctx = document.getElementById('financeChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
                datasets: [
                    {
                        label: 'Entradas',
                        data: [500, 900, 1200, 1600, 2100, 2450],
                        borderColor: '#c8a27c',
                        backgroundColor: 'rgba(200, 162, 124, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true
                    },
                    {
                        label: 'Gastos',
                        data: [200, 350, 500, 650, 820, 980],
                        borderColor: '#a7bfd3',
                        backgroundColor: 'rgba(167, 191, 211, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: { font: { family: 'Montserrat', size: 14 } }
                    }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    </script>
</body>
</html>
