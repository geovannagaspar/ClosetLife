<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário | ClosetLife</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="dashboard">
    <aside class="sidebar">
        <div class="logo">ClosetLife</div>
        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="inventario.html" class="active">Inventário</a>
            <a href="favoritos.html">Favoritos</a>
        </nav>
    </aside>
    <main class="main-content">
        <h1 style="font-family: 'Cormorant Garamond', serif; color: #c8a97e; font-size: 42px; margin-bottom: 30px;">Inventário</h1>
        
        <!-- FORMULÁRIO COM AS CORES DO SITE -->
        <section style="background: #fdfbf7; padding: 30px; border-radius: 20px; margin-bottom: 40px; border: 1px solid #e8d5b5; box-shadow: 0 4px 15px rgba(0,0,0,0.05 );">
            <h2 style="color: #c8a97e; font-family: 'Cormorant Garamond', serif; margin-bottom: 20px; font-size: 24px;">+ Adicionar Nova Peça</h2>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <input type="text" id="nomePeca" placeholder="Nome da peça (ex: Vestido Gala)" 
                       style="flex: 1; min-width: 200px; padding: 12px; border-radius: 10px; border: 1px solid #e8d5b5; background: #fff; outline: none; font-family: 'Montserrat', sans-serif;">
                
                <input type="text" id="imagemPeca" placeholder="Caminho da imagem (ex: img/vestido.jpg)" 
                       style="flex: 1; min-width: 200px; padding: 12px; border-radius: 10px; border: 1px solid #e8d5b5; background: #fff; outline: none; font-family: 'Montserrat', sans-serif;">
                
                <button onclick="adicionarNovaRoupa()" 
                        style="background: #c8a97e; color: #fff; padding: 12px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-family: 'Montserrat', sans-serif; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;">
                    Salvar Peça
                </button>
            </div>
        </section>

        <div class="closet-grid" id="inventarioGrid"></div>
    </main>
</div>

<script src="script.js"></script>
<script>
    function adicionarNovaRoupa() {
        const nome = document.getElementById('nomePeca').value;
        const imagem = document.getElementById('imagemPeca').value;
        
        if (nome && imagem) {
            const lista = JSON.parse(localStorage.getItem('roupas')) || [];
            lista.push({ 
                nome: nome, 
                categoria: "Nova Peça", 
                imagem: imagem, 
                favorita: false 
            });
            localStorage.setItem('roupas', JSON.stringify(lista));
            
            // Limpa os campos
            document.getElementById('nomePeca').value = '';
            document.getElementById('imagemPeca').value = '';
            
            // Recarrega a lista na tela
            if (typeof renderizar === 'function') {
                renderizar();
            }
            alert('Peça adicionada com sucesso!');
        } else {
            alert('Por favor, preencha o nome e o caminho da imagem.');
        }
    }
</script>
</body>
</html>
