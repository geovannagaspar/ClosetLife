<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClosetLife</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>

    <!-- 1. TELA DE LOGIN -->
    <div id="tela-login" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #f7f2eb, #dbe8f1); display: none; justify-content: center; align-items: center; z-index: 10000;">
        <div style="background: rgba(255, 255, 255, 0.45); padding: 40px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.6); backdrop-filter: blur(18px); text-align: center; width: 320px; box-shadow: 0 8px 25px rgba(0,0,0,0.06);">
            <h1 style="color: #c8a27c; font-family: 'Cormorant Garamond', serif; font-size: 32px; margin-bottom: 10px;">ClosetLife</h1>
            <p style="color: #4b4037; font-family: 'Montserrat', sans-serif; font-weight: 300; margin-bottom: 25px; font-size: 12px; letter-spacing: 2px;">ACESSE SEU CLOSET DIGITAL</p>
            <input type="password" id="senhaInput" placeholder="Senha (1234 )" style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.6); background: rgba(255, 255, 255, 0.5); color: #4b4037; text-align: center; outline: none; font-family: 'Montserrat', sans-serif;">
            <button onclick="verificarLogin()" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #c8a27c, #9fbad1); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; box-shadow: 0 8px 20px rgba(167,191,211,0.25);">ENTRAR</button>
            <p id="erroLogin" style="color: #d9534f; display: none; margin-top: 15px; font-size: 13px;">Senha incorreta!</p>
        </div>
    </div>

    <!-- 2. SPLASH SCREEN (Abertura) -->
    <div id="splash" style="display: none;">
        <div class="splash-content">
            <h1>ClosetLife</h1>
            <p>Seu closet digital</p>
        </div>
    </div>

    <!-- 3. MENU PRINCIPAL (Home) -->
    <div class="home-menu" id="menu-principal" style="display: none;">
        <h1 class="home-logo">ClosetLife</h1>
        <p class="home-subtitle">Seu closet digital</p>

        <div class="home-buttons">
            <a href="inventario.html" class="lux-btn">Inventário</a>
            <a href="agenda.html" class="lux-btn">Agenda</a>
            <a href="favoritos.html" class="lux-btn">Favoritos</a>
            <a href="financeiro.html" class="lux-btn">Financeiro</a>
        </div>

        <div class="home-buttons" style="margin-top:25px;">
            <a href="documentacao.html" class="lux-btn">Documentação</a>
            <a href="uml.html" class="lux-btn">UML</a>
        </div>
    </div>

    <script>
        // Lógica de Login e Transição
        function verificarLogin() {
            const senha = document.getElementById('senhaInput').value;
            if (senha === "1234") {
                // Esconde Login
                document.getElementById('tela-login').style.display = 'none';
                // Mostra Splash
                document.getElementById('splash').style.display = 'flex';
                
                // Depois de 3 segundos, esconde Splash e mostra Menu
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('menu-principal').style.display = 'block';
                    feather.replace();
                }, 3000);

                sessionStorage.setItem('logado', 'sim');
            } else {
                document.getElementById('erroLogin').style.display = 'block';
            }
        }

        // Ao carregar a página
        window.addEventListener('load', () => {
            if (sessionStorage.getItem('logado') === 'sim') {
                // Se já logou antes, pula o login e a splash
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('splash').style.display = 'none';
                document.getElementById('menu-principal').style.display = 'block';
                feather.replace();
            } else {
                // Primeira vez: mostra splash por 3 segundos, depois login
                document.getElementById('splash').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('tela-login').style.display = 'flex';
                }, 3000);
            }
        });
    </script>
</body>
</html>
