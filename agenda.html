<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda | ClosetLife</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">ClosetLife</div>
            <nav class="menu">
                <a href="index.html"><i data-feather="grid"></i>Dashboard</a>
                <a href="inventario.html"><i data-feather="shopping-bag"></i>Inventário</a>
                <a href="agenda.html" class="active"><i data-feather="calendar"></i>Agenda</a>
                <a href="favoritos.html"><i data-feather="heart"></i>Favoritos</a>
                <a href="financeiro.html"><i data-feather="dollar-sign"></i>Financeiro</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h1>Agenda</h1>
                <p>Planeje seus looks para a semana</p>
            </header>

            <section class="card" style="padding: 30px; margin-bottom: 40px;">
                <h2 style="color: var(--gold); font-family: 'Cormorant Garamond', serif; margin-bottom: 20px; font-size: 28px;">+ Agendar Look</h2>
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <input type="text" id="eventoNome" placeholder="Evento (ex: Jantar, Trabalho)" 
                           style="flex: 1; min-width: 200px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #fff; outline: none; font-family: 'Montserrat', sans-serif;">
                    
                    <input type="date" id="eventoData" 
                           style="flex: 1; min-width: 200px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #fff; outline: none; font-family: 'Montserrat', sans-serif;">
                    
                    <button onclick="agendarEvento()" 
                            style="background: var(--gold); color: #fff; padding: 15px 30px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-family: 'Montserrat', sans-serif; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;">
                        Agendar
                    </button>
                </div>
            </section>

            <div class="closet-grid" id="agendaGrid"></div>
        </main>
    </div>

    <script>
        feather.replace();

        function agendarEvento() {
            const nome = document.getElementById('eventoNome').value;
            const data = document.getElementById('eventoData').value;
            
            if (nome && data) {
                const eventos = JSON.parse(localStorage.getItem('agenda')) || [];
                eventos.push({ nome, data });
                localStorage.setItem('agenda', JSON.stringify(eventos));
                
                document.getElementById('eventoNome').value = '';
                document.getElementById('eventoData').value = '';
                
                renderizarAgenda();
                alert('Evento agendado!');
            } else {
                alert('Preencha todos os campos.');
            }
        }

        function renderizarAgenda() {
            const eventos = JSON.parse(localStorage.getItem('agenda')) || [];
            const grid = document.getElementById('agendaGrid');
            grid.innerHTML = '';

            eventos.forEach((ev, i) => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.style.padding = '20px';
                card.innerHTML = `
                    <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--gold);">${ev.nome}</h3>
                    <p style="font-family: 'Montserrat', sans-serif; color: var(--soft);">${ev.data}</p>
                    <button onclick="removerEvento(${i})" class="remove-btn">Remover</button>
                `;
                grid.appendChild(card);
            });
        }

        function removerEvento(i) {
            const eventos = JSON.parse(localStorage.getItem('agenda')) || [];
            eventos.splice(i, 1);
            localStorage.setItem('agenda', JSON.stringify(eventos));
            renderizarAgenda();
        }

        renderizarAgenda();
    </script>
</body>
</html>
