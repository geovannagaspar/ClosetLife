<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Favoritos | ClosetLife</title>

  <link rel="stylesheet" href="style.css">

  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>

  <div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="logo">
        ClosetLife
      </div>

      <nav class="menu">

        <a href="index.html">
          <i data-feather="grid"></i>
          <span>Dashboard</span>
        </a>

        <a href="inventario.html">
          <i data-feather="shopping-bag"></i>
          <span>Inventário</span>
        </a>

        <a href="agenda.html">
          <i data-feather="calendar"></i>
          <span>Agenda</span>
        </a>

        <a href="favoritos.html" class="active">
          <i data-feather="heart"></i>
          <span>Favoritos</span>
        </a>

        <a href="financeiro.html">
          <i data-feather="dollar-sign"></i>
          <span>Financeiro</span>
        </a>

      </nav>

    </aside>

    <!-- MAIN -->
    <main class="main-content">

      <header class="topbar">

        <div>
          <h1>Favoritos</h1>
          <p>Suas peças favoritas </p>
        </div>

      </header>

      <!-- GRID -->
      <div class="closet-grid" id="favoritosGrid"></div>

    </main>

  </div>

  <script>

    feather.replace();

    function pegarRoupas(){

      return JSON.parse(
        localStorage.getItem('roupas')
      ) || [];

    }

    function renderizarFavoritos(){

      const roupas = pegarRoupas();

      const favoritas =
        roupas.filter(r => r.favorita);

      const grid =
        document.getElementById('favoritosGrid');

      grid.innerHTML = '';

      if(favoritas.length === 0){

        grid.innerHTML = `

          <div class="empty-state">

            <h3>Nenhuma peça favorita</h3>

            <p>
              Favorite roupas no dashboard 
            </p>

          </div>

        `;

        return;

      }

      favoritas.forEach((roupa) => {

        const card =
          document.createElement('div');

        card.classList.add('item-card');

        card.innerHTML = `

          <img src="${roupa.imagem}">

          <div class="item-content">

            <h3>${roupa.nome}</h3>

            <div class="item-category">
              ${roupa.categoria}
            </div>

          </div>

        `;

        grid.appendChild(card);

      });

    }

    renderizarFavoritos();

  </script>

</body>
</html>
