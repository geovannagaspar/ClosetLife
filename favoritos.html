<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favoritos | ClosetLife</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="dashboard">
  <aside class="sidebar">
    <div class="logo">ClosetLife</div>
    <nav class="menu">
      <a href="index.html"><i data-feather="grid"></i><span>Dashboard</span></a>
      <a href="inventario.html"><i data-feather="shopping-bag"></i><span>Inventário</span></a>
      <a href="agenda.html"><i data-feather="calendar"></i><span>Agenda</span></a>
      <a href="favoritos.html" class="active"><i data-feather="heart"></i><span>Favoritos</span></a>
      <a href="financeiro.html"><i data-feather="dollar-sign"></i><span>Financeiro</span></a>
      <a href="documentacao.html"><i data-feather="book-open"></i><span>Documentação</span></a>
      <a href="uml.html"><i data-feather="git-branch"></i><span>UML</span></a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div>
        <h1>Favoritos</h1>
        <p>Suas peças favoritas</p>
      </div>
    </header>

    <div class="closet-grid" id="favoritosGrid"></div>
  </main>
</div>

<script>
  // ===== PEÇAS PADRÃO (CARREGADAS DA PASTA IMG) =====
  const pecasPadrao = [
    { nome: "Camisa Casual", categoria: "Camisas", imagem: "img/camisa.jpg", favorita: true },
    { nome: "Calça Jeans", categoria: "Calças", imagem: "img/jeans.webp", favorita: false },
    { nome: "Tênis Esportivo", categoria: "Calçados", imagem: "img/tenis.jpg", favorita: true },
    { nome: "Bolsa Elegante", categoria: "Acessórios", imagem: "img/bolsa.jpg", favorita: false },
    { nome: "Camisa Masculina", categoria: "Camisas", imagem: "img/camisamascu.jpg", favorita: false },
    { nome: "Calça Sarja", categoria: "Calças", imagem: "img/calca.jpg", favorita: false },
    { nome: "Bolsa Modern", categoria: "Acessórios", imagem: "img/bolsa1.webp", favorita: false },
    { nome: "Roupa Baby 1", categoria: "Outros", imagem: "img/baby.jpg", favorita: false },
    { nome: "Roupa Baby 2", categoria: "Outros", imagem: "img/baby2.webp", favorita: false }
  ];

  // ===== PEGAR ROUPAS DO STORAGE =====
  function pegarRoupas() {
    try {
      const roupas = JSON.parse(localStorage.getItem('roupas'));
      if (roupas && Array.isArray(roupas) && roupas.length > 0) {
        return roupas;
      }
    } catch (e) {
      console.log("Erro ao ler localStorage");
    }
    return pecasPadrao;
  }

  // ===== RENDERIZAR FAVORITOS =====
  function renderizarFavoritos() {
    const grid = document.getElementById('favoritosGrid');
    const roupas = pegarRoupas();
    const favoritas = roupas.filter(r => r.favorita === true);
    
    grid.innerHTML = '';

    if (favoritas.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <h3>Nenhuma peça favorita</h3>
          <p>Favorite roupas no inventário para vê-las aqui.</p>
        </div>
      `;
      return;
    }

    favoritas.forEach((roupa, index) => {
      const card = document.createElement('div');
      card.classList.add('item-card');
      card.innerHTML = `
        <img src="${roupa.imagem}" 
             onerror="this.src='https://via.placeholder.com/300x400?text=Imagem+Indispon%C3%ADvel'" 
             alt="${roupa.nome}"
             style="width:100%; height:280px; object-fit:cover;">
        <div class="item-content">
          <h3>${roupa.nome}</h3>
          <div class="item-category">${roupa.categoria}</div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // ===== INICIALIZAR =====
  document.addEventListener('DOMContentLoaded', () => {
    feather.replace();
    renderizarFavoritos();
  });

  // ===== RECARREGAR QUANDO A ABA FICAR VISÍVEL =====
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      renderizarFavoritos();
    }
  });
</script>

</body>
</html>
