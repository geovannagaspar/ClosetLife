<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favoritos | ClosetLife</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
<div class="dashboard">
  <aside class="sidebar">
    <div class="logo">ClosetLife</div>
    <nav class="menu">
      <a href="index.html"><i data-feather="grid"></i><span>Dashboard</span></a>
      <a href="inventario.html"><i data-feather="shopping-bag"></i><span>Inventário</span></a>
      <a href="agenda.html"><i data-feather="calendar"></i><span>Agenda</span></a>
      <a href="favoritos.html" class="active"><i data-feather="heart"></i><span>Favoritos</span></a>
      <a href="financeiro.html"><i data-feather="dollar-sign"></i><span>Financeiro</span></a>
    </nav>
  </aside>
  <main class="main-content">
    <header class="topbar"><div><h1>Favoritos</h1><p>Suas peças favoritas</p></div></header>
    <div class="closet-grid" id="favoritosGrid"></div>
  </main>
</div>
<script src="script.js"></script>
<script>
  feather.replace( );
  function renderizarFavoritos() {
    const grid = document.getElementById('favoritosGrid');
    const roupas = pegarRoupas().filter(r => r.favorita);
    grid.innerHTML = '';
    if (roupas.length === 0) {
      grid.innerHTML = '<div class="empty-state"><h3>Nenhuma peça favorita</h3><p>Favorite roupas no inventário.</p></div>';
      return;
    }
    roupas.forEach((roupa) => {
      const card = document.createElement('div');
      card.classList.add('item-card');
      card.innerHTML = \`
        <img src="\${roupa.imagem}" onerror="this.src='https://via.placeholder.com/300x400?text=Imagem+Indispon%C3%ADvel'" alt="\${roupa.nome}">
        <div class="item-content"><h3>\${roupa.nome}</h3><div class="item-category">\${roupa.categoria}</div></div>
      \`;
      grid.appendChild(card );
    });
  }
  document.addEventListener('DOMContentLoaded', renderizarFavoritos);
</script>
</body>
</html>
