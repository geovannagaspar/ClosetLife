<!-- TELA DE LOGIN (Cobre tudo no início) -->
<div id="tela-login" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1c1c1f; display: flex; justify-content: center; align-items: center; z-index: 10000;">
    <div style="background: #252529; padding: 40px; border-radius: 15px; border: 1px solid #c8a97e; text-align: center; width: 300px;">
        <h1 style="color: #c8a97e; font-family: 'Cormorant Garamond', serif; margin-bottom: 10px;">ClosetLife</h1>
        <p style="color: #fff; margin-bottom: 20px;">Acesse seu closet digital</p>
        <input type="password" id="senhaInput" placeholder="Digite a senha (1234)" style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: none; outline: none;">
        <button onclick="verificarLogin()" style="width: 100%; padding: 12px; background: #c8a97e; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Entrar</button>
        <p id="erroLogin" style="color: #ff4d4d; display: none; margin-top: 15px; font-size: 14px;">Senha incorreta!</p>
    </div>
</div>

<script>
    function verificarLogin() {
        const senha = document.getElementById('senhaInput').value;
        if (senha === "1234") {
            document.getElementById('tela-login').style.display = 'none';
            // Salva que logou para não pedir de novo se atualizar a página rápido
            sessionStorage.setItem('logado', 'sim');
        } else {
            document.getElementById('erroLogin').style.display = 'block';
        }
    }
    // Se já logou nesta sessão, pula o login
    if (sessionStorage.getItem('logado') === 'sim') {
        document.getElementById('tela-login').style.display = 'none';
    }
</script>
